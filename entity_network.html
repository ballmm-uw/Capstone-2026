<!DOCTYPE html>
<html lang="en">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    #header { padding: 14px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    #header h1 { font-size: 18px; font-weight: 600; color: #e2e8f0; }
    #header .stats { font-size: 13px; color: #94a3b8; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #network { flex: 1; }
    #sidebar { width: 260px; background: #16213e; border-left: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    .sidebar-section { padding: 14px 16px; border-bottom: 1px solid #0f3460; }
    .sidebar-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 10px; }
    #legend { overflow-y: auto; flex: 1; padding: 14px 16px; }
    #legend h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 10px; }
    #info-panel { padding: 14px 16px; border-top: 1px solid #0f3460; min-height: 120px; font-size: 13px; color: #94a3b8; }
    #info-panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 8px; }
    #info-content { color: #cbd5e1; line-height: 1.6; }
    .control-row { display: flex; flex-direction: column; margin-bottom: 10px; }
    .control-row label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    input[type=range] { width: 100%; accent-color: #4E79A7; }
    input[type=text] { width: 100%; padding: 6px 8px; background: #0f3460; border: 1px solid #1e4080; border-radius: 4px; color: #e2e8f0; font-size: 13px; }
    input[type=text]::placeholder { color: #475569; }
    button { width: 100%; padding: 7px; background: #4E79A7; border: none; border-radius: 4px; color: white; font-size: 13px; cursor: pointer; margin-top: 6px; }
    button:hover { background: #3d6085; }
    .filter-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .filter-btn { padding: 3px 8px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid transparent; width: auto; margin: 0; }
    .filter-btn.active { opacity: 1; border-color: white; }
    .filter-btn.inactive { opacity: 0.35; }
  </style>
</head>

  const container = document.getElementById('network');
  const nodes = new vis.DataSet(nodesData);
  const edges = new vis.DataSet(edgesData);
  const options = {
    physics: {
      solver: 'repulsion',
      repulsion: {
        nodeDistance: 200,
        springLength: 150,
        springConstant: 0.04,
        damping: 0.09,
      },
      stabilization: { iterations: 200 },
    },
    edges: {
      smooth: { type: 'continuous' },
      scaling: { min: 1, max: 8 },
      color: { inherit: false },
    },
    nodes: {
      borderWidth: 1.5,
      borderWidthSelected: 3,
    },
    interaction: {
      hover: true,
      tooltipDelay: 100,
      navigationButtons: false,
      keyboard: true,
    },
  };
  const network = new vis.Network(container, { nodes, edges }, options);

  network.on('click', function(params) {
    const infoEl = document.getElementById('info-content');
    if (params.nodes.length > 0) {
      const node = nodes.get(params.nodes[0]);
      infoEl.innerHTML = node.title.replace(/<br>/g, '<br>');
    } else {
      infoEl.innerHTML = 'Click a node to see details.';
    }
  });

  document.getElementById('search-box').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (!q) {
      nodes.update(nodesData.map(n => ({ id: n.id, hidden: false })));
      return;
    }
    nodes.update(nodesData.map(n => ({
      id: n.id,
      hidden: !n.label.toLowerCase().includes(q),
    })));
  });

  const allGroups = new Set(nodesData.map(n => n.group));

  function toggleFilter(btn) {
    const group = btn.dataset.group;
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      btn.classList.add('inactive');
      allGroups.delete(group);
    } else {
      btn.classList.remove('inactive');
      btn.classList.add('active');
      allGroups.add(group);
    }
    nodes.update(nodesData.map(n => ({
      id: n.id,
      hidden: !allGroups.has(n.group),
    })));
  }

  function updatePhysics(param, value) {
    if (param === 'springLength') {
      network.setOptions({ physics: { repulsion: { springLength: parseInt(value) } } });
    } else if (param === 'repulsion') {
      network.setOptions({ physics: { repulsion: { nodeDistance: Math.abs(parseInt(value)) } } });
    }
  }

  function resetView() {
    network.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
    document.getElementById('search-box').value = '';
    nodes.update(nodesData.map(n => ({ id: n.id, hidden: false })));
  }
</script>
